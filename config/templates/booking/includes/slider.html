<div id="mainCarousel"
     class="carousel slide rounded-4 shadow-sm overflow-hidden bg-white"
     data-bs-ride="carousel"
     data-bs-interval="3000">

  <div class="carousel-indicators">
    <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Слайд 1"></button>
    <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="1" aria-label="Слайд 2"></button>
    <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="2" aria-label="Слайд 3"></button>
    <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="3" aria-label="Слайд 4"></button>
  </div>

  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="/media/slider/slide1.jpg" class="d-block w-100 carousel-img" alt="Конференц-зал">
      <div class="carousel-caption bg-dark bg-opacity-50 rounded-3 p-3">
        <h5 class="mb-1">Современные помещения</h5>
        <p class="mb-0 d-none d-md-block">Выберите удобный зал для вашей конференции.</p>
      </div>
    </div>

    <div class="carousel-item">
      <img src="/media/slider/slide2.jpg" class="d-block w-100 carousel-img" alt="Бронирование помещения">
      <div class="carousel-caption bg-dark bg-opacity-50 rounded-3 p-3">
        <h5 class="mb-1">Быстрое бронирование</h5>
        <p class="mb-0 d-none d-md-block">Создайте заявку через личный кабинет.</p>
      </div>
    </div>

    <div class="carousel-item">
      <img src="/media/slider/slide3.jpg" class="d-block w-100 carousel-img" alt="Администрирование заявок">
      <div class="carousel-caption bg-dark bg-opacity-50 rounded-3 p-3">
        <h5 class="mb-1">Быстрый отклик</h5>
        <p class="mb-0 d-none d-md-block">Быстрая обработка новых заявок.</p>
      </div>
    </div>

    <div class="carousel-item">
      <img src="/media/slider/slide4.jpg" class="d-block w-100 carousel-img" alt="Отзывы пользователей">
      <div class="carousel-caption bg-dark bg-opacity-50 rounded-3 p-3">
        <h5 class="mb-1">Настоящие отзывы</h5>
        <p class="mb-0 d-none d-md-block">После обработки заявки вы можете оставить отзыв.</p>
      </div>
    </div>
  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Назад</span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Вперёд</span>
  </button>
</div>
