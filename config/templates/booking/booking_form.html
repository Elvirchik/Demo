{% extends 'booking/base.html' %}
{% block title %}Создание заявки{% endblock %}
{% block content %}
<section class="form-page">
  <form method="post" class="form-card wide back-light-grey">
    {% csrf_token %}
    <p class="eyebrow mb-1 custom-green">Новая заявка</p>
    <h1 class="fw-bold mb-3">Создание заявки</h1>
    {% for field in form %}
      <div class="mb-3">
        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}<div class="field-error">{{ error }}</div>{% endfor %}
      </div>
    {% endfor %}
    <button class="btn btn-custom-green" type="submit">Отправить заявку</button>
    <a class="btn btn-outline-secondary" href="{% url 'dashboard' %}">Назад</a>
  </form>
</section>
{% endblock %}
